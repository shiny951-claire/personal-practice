<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이블1</title>
</head>
<body>
  <!-- 3줄 4칸 -->

  <!-- 
  row 행
  cell 데이타
  -->
  <table>
    <!-- tr*3>td*4>{내용} -->
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
  </table>

  <!-- 2줄 3칸 -->
   <table border="1" width="100%">
    <!-- tr*2>td*3>{내용} -->
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td>가나다 라마바</td> 
      <!-- 내용의 크기만큼 커짐-> 인라인레벨특성, 테이블 사이의 줄바뀜->블록레벨특성 -->
      <td>사아자</td>
      <td>차카타파</td>
    </tr>
   </table>
  <hr>
  <p>블록레벨</p>
  <span>가나다</span>
  <hr>
  <!-- 4줄 5칸 -->
   <table>
    <!-- tr*4>td*5>{내용} -->
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
   </table>
</body>
</html>
