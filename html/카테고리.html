<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리-목록연습</title>
</head>
<body>
  <nav>
  <!-- 
   ul 순서없는 목록
   li 목록아이템 
  -->
  <!-- 
   <태그>내용</태그>
   내용: 텍스트 또는 태그
  -->
    <ul>
      <!--  대분류 -->
      <li>Best100</li>
      <!-- li*5 -->
      <li>new 10%</li>
      <li>DRESS</li>
      <li>OUTER</li>
      <li>TOP
        <!-- ul>li*3 -->
        <ul>
          <li>티</li>
          <li>셔츠</li>
          <li>블라우스</li>
        </ul>
      </li>
      <li>BOTTOM
        <!-- 대분류 bottom에 속한 중분류 아이템 2개 -->
         <!-- ul>li*2  -->
         <ul>
          <li>팬츠</li>
          <li>스커트</li>
         </ul>
      </li>
    </ul>
  </nav>


</body>
</html>
