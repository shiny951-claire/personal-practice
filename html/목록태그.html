<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목록태그1
  </title>
</head>
<body>
  <h1>목록태그</h1>
  <H2>순서가 있는 목록</H2>
  <P>목록의 순서의 의미가 중요</P>
  <P>
    <!-- 
    html 특수문자 코드
    &코드값;
    < &lt;  >&gt;
    &nbsp; non brake space
  -->
  <!-- 퍼블&nbsp;&nbsp;&nbsp;리싱 -->
  &lt;ol&gt; 태그는 &lt;li&gt;태그를 자식으로 가집니다.
    퍼블&nbsp;&nbsp;&nbsp;리싱
  </P>
  <hr>
  <!-- p.title 
   태그. 클래스-->
  <p class="title">ol의 예제</p>
  <!-- ol>li*3 -->
  <!-- ol>li*3>{text} 
   >부모태그>자식태그
   *숫자 :  반복
   $ : 1~9숫자 자동배치
   {} {텍스트내용}-->
  <ol>
    <li>목록의 항목1</li>
    <li>list</li>
    <li>목록의 항목2</li>
    <li>목록의 항목3</li>
    <li>list</li>
  </ol>
  <hr>
  <h2>순서가 없는 목록</h2>
  <ul>
    <li>&lt; ul &gt; &lt; /ul &gt;</li>
    <li>&lt; li &gt;태그가 자식으로 옴</li>
    <li>순서에 의미가 없음</li>
    <li>내비게이션의 목록으로 많이 사용</li>
  </ul>

  
</body>
</html>
