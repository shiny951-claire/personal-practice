<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그리드 미리보기</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- grid
   1. container에 grid선언
   2. 행열 줄칸갯수, 크기 정함
   3. 암시적 그리드 선언(생략가능)
   4. 아이템배티
   5. 여백
   6. 정렬
   -->
  <style>
    /* 모양 */
    .wrap{margin: 50px;}
    .grid-container{background-color: #ccc;box-sizing: border-box;
    gap: 10px;}
    .grid-container .item{background-color: dodgerblue;border:1px solid #000;box-sizing: border-box;}
    /* grid */
    .grid-container{
      display: grid;
      grid-template-rows: 100px 100px;
      /* grid-template-columns: repeat(3, 100px); */
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 100px;
    }
     .grid-container .item{

     }
      .grid-container .item:nth-child(1){
        grid-column: 1/3;
      }
      .grid-container .item:nth-child(2){
        grid-column: 3/4;
        grid-row: 1/3;
      }
      .grid-container .item:nth-child(3){
        /* grid-row: 3/4; */
        grid-column: -1/-3;
      }
      .grid-container .item:nth-child(4){
        grid-row: 4/2;
        /* grid-column: 1/2; */
      }
      .grid-container .item:nth-child(5){
        grid-column: 2/3;
        grid-row: 2/3;
      }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
      <div class="item">item5</div>
      <div class="item">item6</div>
      <div class="item">item7</div>
      <div class="item">item8</div>

    </div>
  </div>
</body>
</html>
