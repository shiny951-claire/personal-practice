<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid1-행열갯수지정</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- grid
   1. container에 grid선언
   2. 행열 줄칸갯수, 크기 정함
   3. 암시적 그리드 선언(생략가능)
   4. 아이템배티
   5. 여백
   6. 정렬
   -->
  <style>
    /* 모양 */
    .wrap{margin: 50px;}
    .grid-container{background-color: magenta;
      box-sizing: border-box;
    }
    .grid-container .item{
      opacity: 0.5;
      box-sizing: border-box;
      background-color: dodgerblue;
      border: 1px solid #fff;}

    /* grid */
    .grid-container{
      display: grid;
      /* 2 줄칸선언 */
      /* 2줄 row */
      grid-template-rows: 100px 200px;
      grid-template-rows: repeat(2,100px);
      grid-template-columns: repeat(4, 100px); 
      /* grid-template-columns: repeat(2, 100px 200px); */
      /* grid-template-columns: 20px repeat(6, 50px) 20px; */

        /* fr : 부모의 고정된 공간 외 남은 공간을 비율로 나눌 단위 */
        /* 12컬럼 그리드 시스템->1fr */
        /* 12컬럼 긔드에서 3컬럼을 4개 만들어라 */
        grid-template-columns: repeat(4,3fr);
        grid-template-columns: 1fr 4fr 1fr;
        grid-template-columns: 100px 1fr 150px;
        grid-template-columns: 20% minmax(500px, 50%) 30%;
        

        /*  */

    }
     .grid-container .item{

     }
      .grid-container .item:nth-child(1){
      }
      .grid-container .item:nth-child(2){
      }
      .grid-container .item:nth-child(3){
      }
      .grid-container .item:nth-child(4){
      }
      .grid-container .item:nth-child(5){
      }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
      <div class="item">item5</div>
      <div class="item">item6</div>
      <div class="item">item7</div>
      <div class="item">item8</div>

    </div>
  </div>
</body>
</html>
