<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius 2</title>
  <style>
    *{margin: 0; padding: 0;}
    body{
      margin:50px;
          }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
      /* 넘친게 부모이기 때문에 부모에게 오버플로우 부여 */
    }
    .child{
      background-color: rgba(255,0,0,0.5);
      height: 100%;
      
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="child">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ut eligendi omnis temporibus molestiae eos eum inventore doloremque minus possimus saepe mollitia, dignissimos quos reiciendis, sapiente pariatur expedita cum placeat cupiditate.</div>
  </div>
  
</body>
</html>
