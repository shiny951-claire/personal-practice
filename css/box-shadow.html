<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box-shadow</title>
  <style>
    *{margin: 0; padding: 0;}
    /* body태그에 양쪽 50px 바깥여백 */
    body{
      margin: 0 50px;
      /* box-sizing: border-box; 박스사이즈는 상속하지 않음*/
    }
    .box{
      /* width, height 지정한 값이 콘텐츠 영역으로 지정 */
      box-sizing: content-box;
      width: 200px; height: 200px;
      background-color: #ccc;
      margin: 50px 0;

      /* box shadow */      
      /* box shadow : x-offset y-offset blur #000000
      y축은 반대로 적용된다고 생각하자.*/      
      box-shadow: 10px 10px 10px #000000; 
    }
    .box1{
      box-shadow: 0px 0px 4px #333; 
      background-color: #fff;
    }
    .box2{
      box-shadow: 
      4px 4px 2px #f00,
      8px 8px 2px #0f0, 
      12px 12px 2px #00f;
    }
    .box3{
      box-shadow: 10px 10px 10px #000000;
    }

  </style>
</head>
<body>
  <h1>box-shadow</h1>
  <p>요소(element 태그)에 그림자 효과를 줍니다.</p>
  <!-- .box.box$*3>{box$} -->
  <div class="box box1">box1</div>
  <div class="box box2">box2</div>
  <div class="box box3">box3</div>
</body>
</html>
