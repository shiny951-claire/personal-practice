<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부모의 너비를 따르는 이미지</title>
  <style>
    *{margin: 0;padding: 0;}
    /* .wrap{margin: 30px;} */
    .img-wrap{
      background-color: red;
    }
    /* 부모의 너비랑 상관없이 이미지는 항상 부모의 너비를 따라서 자동 조절 */
    .img-wrap img{
      width: 100%;
      display: block;
      opacity: 0.5;
    }

    /* 부모의 너비를 따르지만 자신의 크기보다는 더 커지지 않아야 할 때 */
    .max-img{
      width: 80%;
      background-color: #0f0;
    }
    .max-img img{
      opacity: 0.5;/*삭제*/
      /* 부모의 너비를 따르지만 자신크기보다 커지지 마라 */
      /* width: 100%; (x) width:auto;여야함 */
      max-width: 100%;
    }
    /* 부모늬 높이를 따르는 이미지 */
    .img-wrap2{
      background-color: #00f;
      height: 400px;
    }
    .img-wrap2 img{
      opacity: 0.5;/*삭제*/
      height: 100%;
      /* width: auto; */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="img-wrap">
      <img src="../images/smartbanner-01-03-pc.png" alt="원피스 할인 이벤트">
    </div>
    <div class="max-img">
      <img src="../images/test-img.png" alt="">
    </div>
    <div class="img-wrap2">
      <img src="../images/test-img.png" alt="">
    </div>
  </div>
  <!-- //.wrap -->
</body>
</html>
