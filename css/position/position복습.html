<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position복습</title>
  <style>
    *{margin: 0;padding: 0;}
    .wrap{
      margin: 50px;
      background-color: #ccc;    
      padding: 20px;
    }
    .section{
      background-color: #ddd;
      padding: 20px;
    }
    .wrap .section .parent{
      background-color: beige;
      padding: 20px;
      position: relative;
    }
    .wrap .section .parent .child:nth-child(1){
      background-color: magenta;
      padding: 10px;
      width: 50px; height: 50px;
      box-sizing: border-box;
      position: absolute;
      left: 0; top: 0;
    }
    .wrap .section .parent .child:nth-child(2){
      background-color: cyan;
      padding: 10px;
      width: 50px; height: 50px;
      /* 베이지배경의 우측상단에 붙이고 싶음 */
      right: 0; top:0;
      position:relative;/*원래위치기준*/
      position: fixed;/*브라우저기준*/
      position:absolute;/*가까운 조상*/
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="section">
      <div class="parent">
        <div class="child">child1</div>
        <div class="child">child2</div>
      </div>
    </div>
  </div>
</body>
</html>
