<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>float layout2</title>
  <style>
    *{margin: 0;padding: 0;}
    ol,ul{list-style: none;}
    /* layout */
    header{background-color: #ccc;min-height: 100px;}
    
    /* content */
    .content{
      background-color: #ddd;
      width: 90%;
      margin: 0 auto;}
      
    .content .box{}
    .content .box1{
      background-color: #68f;
      min-height: 100px;
      width: 15%;
      float: left;/*너 부모나 형제 왼쪽으로*/
    }
    .content .box2{
      background-color: #6f8;
      min-height: 200px;
      /* width: 75%; */
      /* calc(값1 - 값2); 값1과 값2 중 한 개는 픽셀단위 */
      width: calc(75% - 100px);
      float: left;/*단으로 쓰려는 모든 문단을 float처리함*/
      margin-left: 50px;
    }

    .content .box3{
      background-color: #f68;
      min-height: 300px;
      width: 10%;
      float: right; /*너 부모나 형제 오른쪽으로*/
    }

    /* float문제 해결 */
    .content::after{
      content: "";
      display: block;
      clear: both;/*양쪽 float의 영향을 받지 않겠다*/
    }

    footer{background-color: #ccc;min-height: 200px;}
  </style>
</head>
<body>
  <div class="wrap">
    <header>헤더</header>
    <main class="content">
      <div class="box box1">왼쪽</div>
      <div class="box box2">가운데</div>
      <div class="box box3">오른쪽</div>
    </main>
    <footer>푸터</footer>
  </div>
</body>
</html>
