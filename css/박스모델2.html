<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box model</title>
  <style>
    *{margin:0; padding: 0;}
    .box{
      background-color: #ccc;
      margin: 50px;
      width: 200px;
      /* height: 150px; */
      min-height: 150px;
    }
    /* 
    박스모델
    속성: 값1 값2 값3 값4;
    속성: 상 우 하 좌;
    속성: 값1 값2 값3;
    속성: 상 우좌 하;
    속성: 값1 값2;
    속성: 상하 우좌;
    속성: 값1;
    속성: 상우하좌;
    */
    .box2{
      border-top:10px solid #f00;
      border-right: 10px dotted darkblue;
      border-bottom: 4px dashed green;
      border-left: 2px double;
      padding: 10px 20px 30px 40px;
    }
    .box3{
      /* border : border-width border-style border-color */
      border: 10px dashed blue;
      padding: 10px 50px 30px;

    }
    .box4{
      border: 10px dashed blue;
      border-left: none;
      border-right: none;
      padding: 10px 50px;
    }
  </style>
  
</head>
<body>
  <div class="box box1">박스1</div>
  <!-- .box.box2>{박스2} -->
  <div class="box box2">박스2</div>
  <!-- div.box.box$@3*2>{박스$@3} -->
  <div class="box box3">박스3</div>
  <div class="box box4">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quibusdam esse id ipsum ratione itaque unde facere obcaecati, numquam ab, ducimus molestiae asperiores placeat qui? Dolor ab provident in perferendis </div>
  
</body>
</html>
