<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position 3</title>
</head>
<body>
  <div class="wrap">
    <div class="thumb">
      <img src="images/test-img.png" alt="">
      <span class="like">좋아요</span>
      <span class="sale-box">10%</span>
    </div>
  </div>
  <style>
    *{margin: 0;padding: 0;}
    .wrap{
      margin:100px 50px;
      background-color: #cc0;
    }
    .thumb{
      background-color: #f00;
    }
    .thumb .like{
      background-color: #86f;
    }
    .thumb .sale-box{
      background-color: #f68;}
    /* 좋아요, 10% 요소의 크기를 w50px h50px */
    .thumb span{width: 50px; height: 50px;}
    /* span 태그는 인라인이라 너비높이 지정못함->디스플레이변경 */
    .thumb span{display: block;}
    /* 좋아요, 세일박스를 위치를 지정
     left, right, top,  bottom
     position: relative(원래위치), absolute(가까운조상), fixed(브라우저) */
    .thumb span{
     position: absolute;
    }
    .thumb{
      position: relative;
      /* display: block; *//*다 하고 이거로 바꿔보기*/
    }
    /* 좋아요를 왼쪽 위 10px에 위치 */
    .thumb .like{
      left: 10px; top: 10px;
    }
    /* 세일박스를 이미지오른쪽위에 위치 */
    .thumb .sale-box{
      right: 10px; top: 10px;
    }
    /* thumb을 화면의 1/4사용하고 싶음 */
    .thumb{width: 25%;}
    /* 이미지가 커서 .thumb보다 커진 문제 발생 */
    .thumb img{width: 100%;}/*부모의 컨텐츠 영역 전부사용*/
    /* 이미지태그는 인라인레벨이라 태그와 태그사이의 줄바꿈을 한 글자로 인식하는 문제 발생함=>디스플레이를 블럭레벨로 변경함 */
    .thumb img{display: block;}
  </style>
</body>
</html>
