<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미디어쿼리2</title>
  <style>
    *{margin: 0;padding: 0;}
    ol,ul{list-style: none;}
    a:link,
    a:visited,
    a:active{
      color:currentColor;
      text-decoration: underline;
    }
    a:hover{color:red;
    text-decoration: underline;}
    
    header{
      background-color: #ccc;
    }
    header .inner{
      width: 90%;
      max-width: 1400px;
      margin: 0 auto;
      background-color: #6cc;
    }
    header .inner::after{
      content: "";
      display: block;
      clear: both;
    }
        

    /* 
    1. 블록레벨 logo gnb util m-nav-btn 한줄로 표시
    */
    header .logo,
    header .gnb-wrap{
      float:left
    }
    header .util,
    header .m-nav-btn{
      float:right
    }

    /* 2. gnb메뉴 한줄로 표시 */
    header .gnb-wrap{
      background-color: #cfc;
      margin-left: 50px;
      display: block;
    }
   
    /* 블록레벨 li을 한줄로 */
    header .gnb-wrap .gnb li{
      display: inline-block;
      padding: 0.5em 1em;
      background-color: #fff;
      margin-right: 1em;
    }

  
    header .util a{
      display: inline-block;
      padding: 0.5em 1em;
      background-color: #fff;
      margin-left: 1em;
    }
  
  

    /* 3. m-nav-gnb를 1024이하에서만 표시 */
    header .m-nav-btn{
      /* display: none; */
    }
    /* 장비특성에 맞는 display 적용 */
    @media(min-width:1025px){
      .mobile-only-block{
        display: none;
     }
   }
   /* 장비특성에 맞는 클래스명으로 display를 지정하는 것을 권장함ㄹ */
    @media(max-width:1024px){
      .pc-only{
        display: none !important;
      }
      .mobile-only-block{
        display: block;
      }
    }/*@media(max-width:1024px)*/

    </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="inner">
        <h1 class="logo">Ran</h1>
        <nav class="gnb-wrap pc-only">
          <ul class="gnb">
            <!-- li*5>a>{menu$} -->
            <li><a href="">menu1</a></li>
            <li><a href="">menu2</a></li>
            <li><a href="">menu3</a></li>
            <li><a href="">menu4</a></li>
            <li><a href="">menu5</a></li>
          </ul>
        </nav>
        <!-- .util>a*3>{상단기능메뉴$} -->
        <div class="util"><a href="">상단기능메뉴1</a>
          <a href="">상단기능메뉴2</a>
          <a href="">상단기능메뉴3</a>
        </div>
        <!-- //.util -->
         <div class="m-nav-btn mobile-only-block">
          <img src="images/menu.png" alt="모바일 사이드 메뉴 펼치기"></div>
      </div>
      <!-- //.inner -->
    </header>
  </div>
</body>
</html>
