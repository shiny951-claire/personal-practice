<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex1 오른쪽아래 정렬</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .visual-section{
      display: flex;
      background-color: #ccc;
      /* viewport를 가득 채운 visual-section */
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      /* 2. 방향 */
      /* 5줄바꿈 */
      /* 6 여백 */
      /* 7 정렬 */
      justify-content: flex-end;
      align-items: flex-end;

      background-image: url(../css/images/background-test.jpg);
      background-repeat: no-repeat;
      background-position: 0 0;
      background-size: auto 150%;
      
    }
    .visual-section .text-wrap{
      /* flex-item */
      background-color: #cff;
      /* 3 확장 축소 */
      /* flex-grow: 0; */
      /* flex-shrink: 1; */
      flex:none;
      /* 4아이템크기 */
      width: 50%;
      min-width: 300px;
      max-width: 500px;
      box-sizing: border-box;
      padding: 1rem 2rem;
      margin-bottom: 100px;
      margin-right: 100px;

    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="visual-section">
      <div class="text-wrap">
        <div class="title">Title</div>
        <div class="desc">Lorem ipsum dolor sit amet consectetur adipisicing elit. Necessitatibus doloremque quia voluptate dolorem, ipsum illum veniam quasi fugit itaque ducimus!</div>
      </div>
    </div>
  </div>
</body>
</html>
