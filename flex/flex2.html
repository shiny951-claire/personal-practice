<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex2 flex컨테이너와 flex item</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .wrap{margin: 50px; }
    .container{
      /* padding:1rem; */
      background-color: #fcc;
      box-sizing: border-box;
    }
    .item{
      border: 1px solid #000;
      box-sizing: border-box;
    }
    
    .flex{
      /* 1. flex 선언 flex box(flex container) */
      display: flex;
      /* 2. flex 방향 설정 */
      /* flex-direction: 주 축의 방향 row; 기본값 */
      /* flex-direction: column; */
      flex-direction: row;
      /* 5.flex-wrap
      만약에 item에 flex-shrink:0;
      flex-grow:0; 설정했을 때
      부모의 크기보다 넘쳐나는 item 줄바꿈 */
      /* flex-wrap: nowrap; */
      flex-wrap: wrap;
      /* 6. gap: flex 아이템 사이의 여백. 컨테이너와 아이템 사이는 적용 안됨 */
      gap: 5px 10px;
      /* 7. 아이템의 정렬 */

      
    }
    /* flex 컨테이너의 직계자식은 flex item */
    .flex .item{
      /* 
      3. flex item 주축크기 확장,축소 결정
      */
      
      /* 4. 아이템 크기결정 */
      /* width: 25%; */
      /* 컨테이너에 gap이 있는 경우
      calc(아이템의 크기 - (gap * (단 - 1)) / 단) */
      width: calc(25% - (10px * (4 - 1)) / 4);
      /* 아이템을 부모의 공간에 맞게 확장 */
      flex-grow: 0;
      /* 아이템을 부모의 공간에 맞게 축소 */
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">lorem</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
      <div class="item">lorem</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
