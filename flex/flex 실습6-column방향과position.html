<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fle실습6-column방향과position</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- 
  1. flex선언 : container
  2. flex방향 결정 container
  3. 아이템의 축소/ 확장 결정 item
  4. 아이템의 크기 결정 item
  5. 아이템의 줄바꿈 결정 container
  6. 여백관리 gap-container margin-item
  7. 정렬 container / item, margin
  -->
  
  <style>
    /* 모양 */
   .inner{background-color: #ccc;}
   #top_nav_box{background-color: #fcc; box-sizing: border-box;}
   #top_nav_box>div{box-sizing: border-box; padding: 0.5rem;}
   #top_nav_box .top_logo{background-color: beige;}
   #top_nav_box .top_category{background-color: dodgerblue;}
   #top_nav_box .top_mypage{background-color: purple;}

    /* size */
    #top_nav_box .top_logo{width: 100px;}
    #top_nav_box .top_category{min-width: 600px; max-width: 700px;}
    #top_nav_box .top_mypage{
      width: 150px;
      position: absolute;
      right: 0; bottom: 0;}

   /* flex */
    .inner{}
   #top_nav_box{
    display: flex;
    /* 2  */
    flex-direction: column;
    /*  5 nowrap */
    /* 6 */
    /* 7 정렬 */
    /* 주축 \ 교차축--> */
    /* justify-content: flex-start */
    align-items: center;
    /*  #top_nav_box .top_mypage{의 기준 */
    position:relative;
   }
   /* 3 grow 0  shrink 1 */
   /* f auto */
   #top_nav_box .top_logo{}
   #top_nav_box .top_category{}
   #top_nav_box .top_mypage{}
  </style>
</head>
<body>
  <div class="inner">
    <div class="top_nav_box" id="top_nav_box">
      <div class="top_logo">로고</div>
      <div class="top_category">카테고리</div>
      <div class="top_mypage">마이페이지</div>
    </div>
    <!-- //#top_nav_box -->
  </div>
  <!-- //.inner -->
</body>
</html>
