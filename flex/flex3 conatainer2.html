<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex3 flex container2</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- 플렉스 컨테이너 속성 실습을 위해서 아이템의 확장, 축소x -->
  <!-- 
  1. flex선언 : container
  2. flex방향 결정 container
  3. 아이템의 축소/ 확장 결정 item
  4. 아이템의 크기 결정 item
  5. 아이템의 줄바꿈 결정 container
  6. 여백관리 gap-container margin-item
  7. 정렬 container / item, margin
  -->
  <style>
    .wrap{margin: 50px; }
    .container{
      background-color: #fcc;
      
        }
    .item{
      border: 1px solid #000;
    }
    .flex1{
      width: 300px;
      height: 150px;
      display: flex;
      flex-direction: row;
       flex-wrap: wrap;
      column-gap: 1rem;
      row-gap: 10px;
      justify-content: start;
      align-content: space-evenly;
      margin-bottom: 50px;
    }
    .flex1 .item{
      flex-grow: 0;
      flex-shrink: 0;
      width: 80px;

    }

    /* flex2 */
    .flex2{
      /*  1. flex선언 : container */
      display: flex;
      /* 실습을 위해서 크기제한함 */
      width: 300px;
      height: 150px;
     
      /* 2. flex방향 결정 container */
      /* flex-direction: row; */
      flex-direction: column;

      /* 5. 아이템의 줄바꿈 결정 container 
      아이템의 합이 컨테이너의 크기보다 클  경우
      flex-wrap: wrap;
      아이템에 flex-shrink: 0; 설정*/
      flex-wrap: wrap;

      /* 6. 여백관리 gap-container */
      /* gap: 1rem; */

      /* 7. 정렬 container */
      /* 주축정렬 */
      justify-content: space-evenly;
      /* 교차축정렬 */
      align-content: space-evenly;
    }


    .flex2 .item{
      /* 3. 아이템의 축소/ 확장 결정 item */
      flex-grow: 0;
      flex-shrink: 0;

      /* 4. 아이템의 크기 결정 item */
      width: 80px;
      /* 단처리를 위한 % 
      calc(아이템의 크기% - (gap * (단 - 1)) / 단);*/
      /* width: calc(33.33% - (1rem * (3 - 1)) / 3); */
      height: 60px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex1">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div><div class="container flex2">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
