<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex에서 margin의 활용</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .container{
      background-color: #ccc;
      width: 100%; height: 100vh;
      display: flex;
      /* 2 row  5 nowrap 6 gap*/
      /* 7 
      주축
      */
      justify-content: flex-start;
      /* 교차축 align-items: stretch; 기본값. 얘때문에 부모의 크기만큼 늘어남 */
      align-items: stretch;
    }
    .item{
      /* width: 100px; height: 100px; */
      background-color: magenta;
      /* 3 grow0 shrink1 */
      /* 4 flex-basis:auto; */
      /* flex item이 나의 내용크기만큼 되겠다 width: auto;*/
      width: 100px;
      /* 6 margin */
      height:  100px;
      margin-left: auto;
      
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">아이템</div>
    <div class="item">아이템</div>
  </div>
</body>
</html>
