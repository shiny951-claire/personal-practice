<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex실습4-flex아이템의 확장</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- 
  1. flex선언 : container
  2. flex방향 결정 container
  3. 아이템의 축소/ 확장 결정 item
  4. 아이템의 크기 결정 item
  5. 아이템의 줄바꿈 결정 container
  6. 여백관리 gap-container margin-item
  7. 정렬 container / item, margin
  -->
  
  <style>
    /* 모양 */
   .inner{background-color: #ccc;}
   #top_nav_box{background-color: #fcc; box-sizing: border-box;}
   #top_nav_box>div{box-sizing: border-box; padding: 0.5rem;}
   #top_nav_box .top_logo{background-color: beige;}
   #top_nav_box .top_category{background-color: dodgerblue;}
   #top_nav_box .top_mypage{background-color: purple;}

    
   /* flex */
    .inner{
      display: flex;
      /* 2 row, 5 nowrap */
    }
   #top_nav_box{
    /* flex item */
    /* 3 grow0 shrink1  */
    /* 4 */
    width:100%;

    display: flex;
    /* 2 row, 5 nowrap */
    /* 6 */
    gap:20px;
    /* 7 */
    /* 주축정렬 */
    /* 아이템사이만 컨테이너의 남은 공간을 동일하게 나누어 여백으로 사용하고 싶어요 */
    /* justify-content: start; */
   }
   #top_nav_box>div{
    /* flex item */
    /* 3 grow0 shrink1 */
    /* 4 flex-basis:auto*/
    text-align: center;
   }
   /* size */
    #top_nav_box .top_logo{width: 100px;}
    #top_nav_box .top_category{flex-grow: 1; }/*남아있는 공간 전부를 사용할게요*/
    #top_nav_box .top_mypage{width: 150px;}

   

   #top_nav_box .top_logo{}
   #top_nav_box .top_category{}
   #top_nav_box .top_mypage{}
  </style>
</head>
<body>
  <div class="inner">
    <div class="top_nav_box" id="top_nav_box">
      <div class="top_logo">로고</div>
      <div class="top_category">카테고리</div>
      <div class="top_mypage">마이페이지</div>
    </div>
    <!-- //#top_nav_box -->
  </div>
  <!-- //.inner -->
</body>
</html>
